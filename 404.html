<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Диёр Хакимов</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.min.css">
  <style>
    body { overflow: hidden; height: 100vh; }
    .e404 {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; flex: 1;
    }
    .e404-num {
      font-family: var(--font-mono); font-size: clamp(80px, 20vw, 200px);
      font-weight: 700; line-height: 1; color: var(--text-body);
      position: relative; cursor: default; user-select: none;
    }
    .e404-num span {
      display: inline-block; transition: transform 0.3s ease;
    }
    .e404-num span:hover {
      transform: rotate(-12deg) scale(1.1);
      color: var(--accent);
    }
    .e404-sub {
      font-family: var(--font-sans); font-size: 20px;
      color: var(--text-dim); margin: 16px 0 32px;
    }
    .e404-link {
      font-family: var(--font-sans); font-size: 18px;
      color: var(--accent); text-decoration: underline;
      text-underline-offset: 4px;
    }
    .e404-hint {
      font-family: var(--font-sans); font-size: 13px;
      color: var(--text-dim); opacity: 0.5; margin-top: 48px;
    }
    .ghost {
      position: fixed; font-size: 32px; pointer-events: none;
      animation: float 3s ease-in-out infinite;
      opacity: 0.15;
    }
    .g1 { top: 15%; left: 12%; animation-delay: 0s; }
    .g2 { top: 60%; right: 15%; animation-delay: 1s; }
    .g3 { bottom: 20%; left: 30%; animation-delay: 2s; font-size: 24px; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
  </style>
  <script data-goatcounter="https://diyordesign.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <nav class="nav"><div class="nav-inner">
    <div class="nav-left">
      <div class="nav-links">
        <a href="index.html">Проекты</a>
        <a href="about.html">Об авторе</a>
      </div>
    </div>
    <div class="nav-lang">
      <span class="active">Ru</span>
      <a href="en/index.html">En</a>
    </div>
  </div></nav>

  <main class="main main--about">
    <div class="e404">
      <div class="e404-num"><span>4</span><span>0</span><span>4</span></div>
      <p class="e404-sub">Здесь ничего нет. Но вы отлично выглядите.</p>
      <a class="e404-link" href="index.html">← Вернуться к проектам</a>
      <p class="e404-hint">Нажмите ~ для секретной консоли</p>
    </div>
  </main>

  <div class="ghost g1">👻</div>
  <div class="ghost g2">🌸</div>
  <div class="ghost g3">✨</div>

  <script src="script.min.js"></script>
</body>
</html>
