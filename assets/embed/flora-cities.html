<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="embed-theme.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #fff;
    position: relative;
  }
  html[data-theme="dark"] body { background: #1a1015; }
  .rose {
    position: absolute;
    inset: 0;
    animation: breathe 6s ease-in-out infinite;
    will-change: transform;
  }
  .rose img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  .petal {
    position: absolute;
    width: 8px;
    height: 10px;
    background: radial-gradient(ellipse at 30% 30%, #f4b8c8, #e891a8);
    border-radius: 50% 50% 50% 0;
    opacity: 0;
    will-change: transform, opacity;
  }
  .p1 { left: 65%; animation: fall 7s ease-in 0s infinite; }
  .p2 { left: 35%; width: 6px; height: 7px; animation: fall 7s ease-in 2.5s infinite; }
  .p3 { left: 52%; width: 5px; height: 6px; animation: fall 7s ease-in 4.5s infinite; }

  @keyframes fall {
    0%   { top: 20%; opacity: 0; transform: rotate(0deg) translateX(0); }
    8%   { opacity: 0.7; }
    30%  { transform: rotate(40deg) translateX(12px); }
    60%  { transform: rotate(-20deg) translateX(-8px); }
    90%  { opacity: 0.5; transform: rotate(60deg) translateX(6px); }
    100% { top: 95%; opacity: 0; transform: rotate(90deg) translateX(0); }
  }
</style>
</head>
<body>
  <div class="rose"><img src="../img/cases/flora/rose-final.jpg" alt=""></div>
  <div class="petal p1"></div>
  <div class="petal p2"></div>
  <div class="petal p3"></div>
</body>
</html>
