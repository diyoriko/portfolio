<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<script src="embed-theme.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a1a;
  display: flex; align-items: center; justify-content: center;
  height: 100vh; overflow: hidden;
}
html[data-theme="light"] body { background: #f3f3f3; }
.g {
  font-size: 36px;
  color: #fff;
  opacity: 0;
  transform: scale(0.8);
  transition: opacity 0.4s ease, transform 0.4s ease;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
html[data-theme="light"] .g { color: #1a1a1a; }
.g.show { opacity: 1; transform: scale(1); }
.g svg { width: 28px; height: 42px; }
</style></head>
<body>
<div class="g" id="g"></div>
<script>
const figma = '<svg viewBox="0 0 38 57" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19 28.5a9.5 9.5 0 1 1 0-19 9.5 9.5 0 0 1 0 19z" fill="#1ABCFE"/><path d="M0 47.5A9.5 9.5 0 0 1 9.5 38H19v9.5a9.5 9.5 0 0 1-19 0z" fill="#0ACF83"/><path d="M19 0v19h9.5a9.5 9.5 0 0 0 0-19H19z" fill="#FF7262"/><path d="M0 9.5A9.5 9.5 0 0 0 9.5 19H19V0H9.5A9.5 9.5 0 0 0 0 9.5z" fill="#F24E1E"/><path d="M0 28.5A9.5 9.5 0 0 0 9.5 38H19V19H9.5A9.5 9.5 0 0 0 0 28.5z" fill="#A259FF"/></svg>';
const glyphs = [figma, '◉', '⬡', '△', '▦'];
const el = document.getElementById('g');
let i = 0;
function next() {
  el.classList.remove('show');
  setTimeout(() => {
    el.innerHTML = glyphs[i];
    el.classList.add('show');
    i = (i + 1) % glyphs.length;
  }, 250);
}
next();
setInterval(next, 1800);
</script>
</body></html>
