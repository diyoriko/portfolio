<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="embed-theme.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #faf5f0;
    position: relative;
  }
  html[data-theme="dark"] body { background: #1a1015; }
  .p {
    position: absolute;
    will-change: transform, top;
  }
  .p svg { display: block; }
  .p1 { left: 35%; width: 48px; animation: fall1 5s cubic-bezier(.25,.1,.25,1) infinite; }
  .p2 { left: 55%; width: 36px; animation: fall2 5s cubic-bezier(.25,.1,.25,1) 2.5s infinite backwards; opacity: 0.7; }
  @keyframes fall1 {
    0%   { top: -60px; transform: rotate(-10deg) translateX(0); }
    15%  { transform: rotate(5deg) translateX(8px); }
    30%  { transform: rotate(-15deg) translateX(-4px); }
    50%  { transform: rotate(8deg) translateX(12px); }
    70%  { transform: rotate(-8deg) translateX(-2px); }
    85%  { transform: rotate(12deg) translateX(6px); }
    100% { top: calc(100% + 10px); transform: rotate(-5deg) translateX(2px); }
  }
  @keyframes fall2 {
    0%   { top: -50px; transform: rotate(12deg) translateX(0); }
    20%  { transform: rotate(-6deg) translateX(-10px); }
    40%  { transform: rotate(10deg) translateX(5px); }
    60%  { transform: rotate(-10deg) translateX(-6px); }
    80%  { transform: rotate(5deg) translateX(3px); }
    100% { top: calc(100% + 10px); transform: rotate(-4deg) translateX(-2px); }
  }
</style>
</head>
<body>
<div class="p p1"><svg viewBox="0 0 32 38"><path d="M16 3C16 3 8 11 7.5 19C7.2 24 10 28 14.5 28.5C19 29 22.5 25 22.5 20C22.5 12 16 3 16 3Z" fill="#CA4F7D" opacity=".9"/><path d="M15.5 7C15.5 7 14 14 13.5 20C13.2 24 14 27 14.5 28" stroke="#fff" stroke-width=".7" fill="none" opacity=".5" stroke-linecap="round"/><path d="M14 13C12.5 15 10.5 17 9 18.5" stroke="#fff" stroke-width=".5" fill="none" opacity=".35" stroke-linecap="round"/><path d="M13.8 18C12 20 10.5 22 10 23" stroke="#fff" stroke-width=".5" fill="none" opacity=".3" stroke-linecap="round"/><path d="M16 12C17.5 14 19.5 16 21 17" stroke="#fff" stroke-width=".5" fill="none" opacity=".35" stroke-linecap="round"/><path d="M15 17C17 19 19 21 20.5 22" stroke="#fff" stroke-width=".5" fill="none" opacity=".3" stroke-linecap="round"/></svg></div>
<div class="p p2"><svg viewBox="0 0 32 38"><path d="M16 3C16 3 8 11 7.5 19C7.2 24 10 28 14.5 28.5C19 29 22.5 25 22.5 20C22.5 12 16 3 16 3Z" fill="#CA4F7D" opacity=".9"/><path d="M15.5 7C15.5 7 14 14 13.5 20C13.2 24 14 27 14.5 28" stroke="#fff" stroke-width=".7" fill="none" opacity=".5" stroke-linecap="round"/><path d="M14 13C12.5 15 10.5 17 9 18.5" stroke="#fff" stroke-width=".5" fill="none" opacity=".35" stroke-linecap="round"/><path d="M16 12C17.5 14 19.5 16 21 17" stroke="#fff" stroke-width=".5" fill="none" opacity=".35" stroke-linecap="round"/></svg></div>
</body>
</html>
